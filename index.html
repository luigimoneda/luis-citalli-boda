<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis & Citlalli | Nuestra Boda</title>

    <meta property="og:title" content="Invitación: Boda de Luis & Citlalli">
    <meta property="og:description" content="Acompáñanos a celebrar nuestro gran día el 11 de julio de 2026.">
    <meta property="og:image" content="https://tuweb.com/img/hero.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --olive: #6B705C;
            --dark-olive: #3A5A40; 
            --cream: #F4F1EA; 
            --white: #ffffff;
            --text-light: #F4F1EA; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-olive);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* TEXTURA PAPEL SUTIL - Ajustada para no interferir con clics */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0.25; 
            pointer-events: none;
            z-index: -1; 
        }

        section {
            padding: 80px 20px;
            max-width: 1100px;
            margin: auto;
            position: relative;
            z-index: 20; 
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white; 
            position: relative;
            overflow: hidden;
            padding: 0; 
        }

        .hero-bg {
            position: absolute;
            inset: -50px 0; 
            background: url('img/hero.jpg') center/cover no-repeat;
            z-index: -1;
            will-change: transform;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 0;
        }

        .hero-content { position: relative; z-index: 2; padding: 20px; }

        .monograma { width: 100px; margin-bottom: 20px; animation: fadeInUp 1.2s ease; }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-family: 'Cormorant Garamond', serif;
            margin-bottom: 10px;
            animation: fadeInUp 1.4s ease;
        }

        /* ANIMACIONES DE ENTRADA */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .fade.visible { opacity: 1; transform: translateY(0); }

        /* TÍTULOS - Centrado asegurado */
        .section-title { 
            text-align: center; 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(2.2rem, 5vw, 2.8rem);
            margin-bottom: 40px;
            color: var(--cream);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            width: 100%;
        }

        /* --- NUEVO: DIVISOR ILUSTRADO BOTÁNICO --- */
        .divider {
            display: block;
            width: 150px; /* Tamaño de la ilustración */
            height: 50px;
            margin: 60px auto; /* Espaciado vertical y centrado horizontal */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" fill="%23F4F1EA"><path d="M50 2.5c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 1c-.6 0-1 .4-1 1s.4 1 1 1 1-.4 1-1-.4-1-1-1zm24 10.1c1.1-.3 2.1-.7 3.1-1.2.9-.5 1.7-1.1 2.3-1.8.6-.7 1-1.5 1.2-2.3.2-.8.1-1.6-.1-2.4-.3-1.1-1-2-1.9-2.5-.9-.5-1.9-.7-2.9-.7-1.1 0-2.1.2-3.1.6-1 .4-1.9.9-2.7 1.6l-.7.7c-2 2-3.8 4.2-5.4 6.6-1.6 2.4-3.1 4.9-4.3 7.5-.3.6-.6 1.2-.8 1.9 1.4-.4 2.8-.7 4.2-.9.5-.1 1-.1 1.5-.1h1.5zm-.5-8.3c.7 0 1.4.1 2 .4s1.2.6 1.6 1.1c.4.5.7 1 .8 1.6.2.6.2 1.2 0 1.8-.1.6-.4 1.1-.8 1.6-.4.5-1 .8-1.6 1.1-.7.3-1.4.4-2.1.4-.7 0-1.4-.1-2-.4s-1.2-.6-1.6-1.1c-.4-.5-.7-1-.8-1.6-.2-.6-.2-1.2 0-1.8.1-.6.4-1.1.8-1.6.4-.5 1-.8 1.6-1.1.7-.3 1.4-.4 2.1-.4zm-47.1 8.3c1.4.2 2.8.5 4.2.9-.3-.6-.5-1.3-.8-1.9-1.2-2.6-2.7-5.1-4.3-7.5-1.6-2.4-3.4-4.6-5.4-6.6l-.7-.7c-.8-.7-1.7-1.2-2.7-1.6-1-.4-2-.6-3.1-.6-1 0-2 .2-2.9.7-.9.5-1.6 1.4-1.9 2.5-.2.8-.3 1.6-.1 2.4.2.8.6 1.6 1.2 2.3.6.7 1.4 1.3 2.3 1.8 1 .5 2 .9 3.1 1.2.5 0 1 .1 1.5.1h1.5c1.1 0 2 .1 2.6.1zm.5-8.3c.7 0 1.4.1 2.1.4.6.3 1.2.6 1.6 1.1.4.5.7 1 .8 1.6.2.6.2 1.2 0 1.8-.1.6-.4 1.1-.8 1.6-.4.5-1 .8-1.6 1.1-.7.3-1.4.4-2.1.4-.7 0-1.4-.1-2-.4s-1.2-.6-1.6-1.1c-.4-.5-.7-1-.8-1.6-.2-.6-.2-1.2 0-1.8.1-.6.4-1.1.8-1.6.4-.5 1-.8 1.6-1.1.7-.3 1.4-.4 2.1-.4zm37.2.7s-.1.1-.1.2c.1-.1.1-.2 0-.2zm-12.2.2s.1-.1.1-.2c-.1.1-.1.2 0 .2z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.7; /* Sutil */
        }

        /* BOTONES (Invertidos) */
        .btn-outline {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 35px;
            border: 1px solid var(--cream);
            color: var(--cream);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-outline:hover { background: var(--cream); color: var(--dark-olive); }

        .event-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--cream);
            color: var(--cream);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .event-btn:hover { background: var(--cream); color: var(--dark-olive); }

        /* COUNTDOWN - Centrado e Imponente */
        .countdown {
            display: flex;
            justify-content: center; 
            gap: clamp(10px, 4vw, 25px);
            margin: 30px auto;
            text-align: center;
        }

        .time-box { text-align: center; min-width: clamp(60px, 15vw, 80px); }

        .time-box span {
            display: block;
            font-size: clamp(2.5rem, 8vw, 3.5rem); 
            font-family: 'Cormorant Garamond', serif;
            color: var(--cream);
            line-height: 1;
            font-weight: 600;
        }

        /* EVENT CARDS - Centrado y Espaciado */
        .event-card {
            padding: 40px 20px;
            text-align: center; 
            max-width: 600px;
            margin: 0 auto 40px auto; 
            border-bottom: 1px solid rgba(244, 241, 234, 0.2); 
        }
        .event-card:last-of-type { border-bottom: none; }

        /* VESTIMENTA */
        .color-palette {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--cream); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* MESA DE REGALOS */
        .gift-card-single {
            padding: 50px 0;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }

        /* FOTOS PARALLAX */
        .photo-section {
            height: 70vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .photo-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
        }
        .photo-content { 
            z-index: 1; 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            padding: 20px;
            max-width: 900px;
            font-style: italic;
        }
