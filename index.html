<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luis & Citlalli | Nuestra Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
  --olive-bg:#4a5c4d;
  --cream:#f9f8f4;
  --dark-olive:#3A5A40;
  --text-dark:#2c3e2f;
  --white:#ffffff;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Montserrat', sans-serif;
  background:var(--olive-bg);
  color:var(--cream);
  overflow-x:hidden;
}

/* TEXTURA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  opacity:.15;
  z-index:-1;
}

/* HERO APPLE STYLE */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:-50px 0;
  background:url('img/hero.jpg') center/cover no-repeat;
  z-index:0;
  transform:translate3d(0,0,0);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0) 50%, var(--olive-bg) 100%);
}

.hero-content{
  position:relative;
  z-index:2;
}

.monograma{
  width:90px;
  margin-bottom:20px;
  opacity:0;
  animation:fadeUp 1s ease forwards;
}

.hero h1{
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(2.5rem,8vw,4.5rem);
  opacity:0;
  animation:fadeUp 1.2s ease forwards;
  animation-delay:.5s;
}

.hero p{
  letter-spacing:3px;
  opacity:0;
  animation:fadeUp 1.2s ease forwards;
  animation-delay:1s;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 35px;
  border:1px solid var(--white);
  color:var(--white);
  text-decoration:none;
  letter-spacing:2px;
  position:relative;
  overflow:hidden;
  opacity:0;
  animation:fadeUp 1.2s ease forwards;
  animation-delay:1.5s;
}

.btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:white;
  transform:translateX(-100%);
  transition:.4s;
  z-index:-1;
}

.btn:hover::after{transform:translateX(0);}
.btn:hover{color:var(--dark-olive);}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

/* SECCIONES */
section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section-title{
  text-align:center;
  font-family:'Cormorant Garamond', serif;
  font-size:2.5rem;
  margin-bottom:50px;
}

/* EVENT CARDS GLASS */
.event-card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  color:var(--text-dark);
  padding:50px;
  margin:30px auto;
  text-align:center;
  max-width:600px;
  border-radius:10px;
}

.event-btn{
  margin-top:15px;
  display:inline-block;
  padding:10px 25px;
  border:1px solid var(--dark-olive);
  color:var(--dark-olive);
  text-decoration:none;
  position:relative;
  overflow:hidden;
}

.event-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:var(--dark-olive);
  transform:translateX(-100%);
  transition:.3s;
  z-index:-1;
}

.event-btn:hover::after{transform:translateX(0);}
.event-btn:hover{color:white;}

/* PHOTO SECTIONS APPLE STYLE */
.photo-section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(60px);
  transition:1.2s;
}

.photo-section.visible{
  opacity:1;
  transform:translateY(0);
}

.photo-bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
}

.photo-section::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

.photo-content{
  position:relative;
  z-index:2;
  font-family:'Cormorant Garamond', serif;
  font-size:2.2rem;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  gap:25px;
}

.time-box span{
  font-size:3rem;
  display:block;
}

/* FADE */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade.visible{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  text-align:center;
  padding:60px;
  font-family:'Cormorant Garamond', serif;
}

</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-content">
    <img src="img/monograma.png" class="monograma">
    <h1>Luis & Citlalli</h1>
    <p>11 DE JULIO 2026</p>
    <a href="#detalles" class="btn">VER INVITACIÓN</a>
  </div>
</section>

<!-- COUNTDOWN -->
<section id="detalles" class="fade">
  <h2 class="section-title">Cuenta Regresiva</h2>
  <div class="countdown">
    <div class="time-box"><span id="days"></span>Días</div>
    <div class="time-box"><span id="hours"></span>Hr</div>
    <div class="time-box"><span id="minutes"></span>Min</div>
    <div class="time-box"><span id="seconds"></span>Seg</div>
  </div>
</section>

<!-- EVENTOS -->
<section class="fade">
  <div class="event-card">
    <h2>Ceremonia</h2>
    <p>5:00 PM</p>
    <a href="#" class="event-btn">Ver ubicación</a>
  </div>

  <div class="event-card">
    <h2>Recepción</h2>
    <p>9:00 PM</p>
    <a href="#" class="event-btn">Ver ubicación</a>
  </div>
</section>

<!-- STORY PHOTOS -->
<section class="photo-section">
  <div class="photo-bg" style="background-image:url('img/galeria1.jpg')"></div>
  <div class="photo-content">Cada historia comienza con una mirada</div>
</section>

<section class="photo-section">
  <div class="photo-bg" style="background-image:url('img/galeria2.jpg')"></div>
  <div class="photo-content">Y crece con cada momento</div>
</section>

<section class="photo-section">
  <div class="photo-bg" style="background-image:url('img/galeria3.jpg')"></div>
  <div class="photo-content">Hoy comienza nuestro para siempre</div>
</section>

<footer>
  ♡ Luis & Citlalli ♡
</footer>

<script>

/* PARALLAX HERO */
const heroBg = document.getElementById('heroBg');

window.addEventListener('scroll', () => {
  const y = window.pageYOffset;
  requestAnimationFrame(()=>{
    heroBg.style.transform = `translate3d(0, ${y*0.3}px, 0)`;
  });
});

/* PARALLAX FOTOS */
document.querySelectorAll('.photo-section').forEach(section=>{
  window.addEventListener('scroll', ()=>{
    const bg = section.querySelector('.photo-bg');
    const rect = section.getBoundingClientRect();
    bg.style.transform = `translate3d(0, ${rect.top*0.2}px, 0) scale(1.1)`;
  });
});

/* FADE */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
    }
  });
},{threshold:0.2});

document.querySelectorAll('.fade, .photo-section').forEach(el=>observer.observe(el));

/* COUNTDOWN */
const date = new Date("July 11, 2026 17:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const d = date - now;

  document.getElementById("days").innerHTML=Math.floor(d/(1000*60*60*24));
  document.getElementById("hours").innerHTML=Math.floor((d%(1000*60*60*24))/(1000*60*60));
  document.getElementById("minutes").innerHTML=Math.floor((d%(1000*60*60))/(1000*60));
  document.getElementById("seconds").innerHTML=Math.floor((d%(1000*60))/1000);
},1000);

</script>

</body>
</html>
