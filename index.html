<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis & Citlalli | Nuestra Boda</title>

    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" href="img/monograma.png">

    <meta property="og:title" content="Invitación: Boda de Luis & Citlalli">
    <meta property="og:description" content="Acompáñanos a celebrar nuestro gran día el 11 de julio de 2026.">
    <meta property="og:image" content="https://tuweb.com/img/hero.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --olive: #6B705C;
            --dark-olive: #3A5A40; 
            --cream: #F4F1EA; 
            --text-light: #F4F1EA; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-olive);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* TEXTURA PAPEL */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0.25; 
            pointer-events: none;
            z-index: -1; 
        }

        /* --- HERO CON LLENADO DE PANTALLA Y DEGRADADO DE FUSIÓN --- */
        .hero {
            height: 100vh; /* Llena toda la pantalla al entrar */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white; 
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('img/hero.jpg') center/cover no-repeat;
            z-index: -1;
        }

        /* EL DEGRADADO QUE FUNDE LA FOTO CON EL FONDO OLIVO */
        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            /* Degradado de transparente a olivo oscuro en la base */
            background: linear-gradient(to bottom, rgba(58, 90, 64, 0) 60%, rgba(58, 90, 64, 1) 100%);
            z-index: 1;
        }

        .hero-content { 
            position: relative; 
            z-index: 2; 
            padding: 20px;
        }

        .monograma { width: 100px; margin-bottom: 10px; animation: fadeInUp 1.2s ease; }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem); 
            font-family: 'Cormorant Garamond', serif;
            animation: fadeInUp 1.4s ease;
        }

        /* SECCIONES Y CONTADOR */
        section { padding: 80px 20px; max-width: 1100px; margin: auto; }
        
        .section-title { 
            text-align: center; 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: var(--cream);
        }

        .countdown {
            display: flex;
            justify-content: center; 
            gap: 20px;
            text-align: center;
        }

        .time-box span {
            display: block;
            font-size: 3rem; 
            font-family: 'Cormorant Garamond', serif;
            color: var(--cream);
            line-height: 1;
        }

        .event-card {
            text-align: center; 
            max-width: 600px;
            margin: 0 auto 40px; 
            border-bottom: 1px solid rgba(244, 241, 234, 0.2); 
            padding-bottom: 30px;
        }

        .event-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            border: 1px solid var(--cream);
            color: var(--cream);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .event-btn:hover { background: var(--cream); color: var(--dark-olive); }

        .fade { opacity: 0; transform: translateY(30px); transition: 1.2s; }
        .fade.visible { opacity: 1; transform: translateY(0); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <img src="img/monograma.png" alt="Luis & Citlalli" class="monograma">
            <h1>Luis & Citlalli</h1>
            <p style="letter-spacing: 3px;">11 DE JULIO DE 2026</p>
        </div>
    </section>

    <section id="detalles" class="fade">
        <h2 class="section-title">Cuenta Regresiva</h2>
        <div class="countdown">
            <div class="time-box"><span id="days">0</span>Días</div>
            <div class="time-box"><span id="hours">0</span>Hr</div>
            <div class="time-box"><span id="minutes">0</span>Min</div>
            <div class="time-box"><span id="seconds">0</span>Seg</div>
        </div>
    </section>

    <section class="fade">
        <div class="event-card">
            <h2 class="section-title" style="font-size: 1.8rem;">Ceremonia</h2>
            <p>5:00 PM | Parroquia Sagrado Corazón</p>
            <a href="#" class="event-btn">Ver Mapa</a>
        </div>
        <div class="event-card">
            <h2 class="section-title" style="font-size: 1.8rem;">Recepción</h2>
            <p>9:00 PM | Hacienda Elegancia</p>
            <a href="#" class="event-btn">Ver Mapa</a>
        </div>
    </section>

    <script>
        // Lógica del contador y animaciones
        const weddingDate = new Date("July 11, 2026 17:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
        });
        document.querySelectorAll('.fade').forEach(el => observer.observe(el));
    </script>
</body>
</html>
